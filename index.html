<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0c10">
  <title>UFC Universe — God Mode</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥊</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="topbar">
    <button id="menu-btn" class="icon-btn" aria-label="Menu">☰</button>
    <div class="brand"><span id="topbar-universe">UFC Universe</span> <em>God Mode</em></div>
    <div class="spacer"></div>
    <div class="date" id="topbar-date">—</div>
  </header>

  <nav class="drawer" id="drawer" aria-label="Main navigation">
    <h3>Universe</h3>
    <button data-route="dashboard"><span class="ico">🏠</span>Dashboard</button>
    <button data-route="time"><span class="ico">📅</span>Advance Time</button>

    <h3>Fighters</h3>
    <button data-route="create"><span class="ico">✍️</span>Create Fighter</button>
    <button data-route="roster"><span class="ico">🥋</span>Roster</button>

    <h3>Fight Night</h3>
    <button data-route="book"><span class="ico">🥊</span>Book a Fight</button>
    <button data-route="history"><span class="ico">📜</span>Fight History</button>

    <h3>Glory</h3>
    <button data-route="rankings"><span class="ico">🏆</span>Rankings</button>
    <button data-route="records"><span class="ico">📊</span>Record Books</button>
    <button data-route="goat"><span class="ico">🐐</span>GOAT</button>

    <h3>System</h3>
    <button data-route="data"><span class="ico">💾</span>Save &amp; Data</button>
  </nav>
  <div class="scrim" id="scrim"></div>

  <main class="wrap" id="app-content"></main>

  <div id="toast"></div>

  <script src="database.js"></script>
  <script src="fightEngine.js"></script>
  <script src="engine.js"></script>
  <script src="rankings.js"></script>
  <script src="save.js"></script>
  <script src="ui.js"></script>
  <script src="app.js"></script>
</body>
</html>
